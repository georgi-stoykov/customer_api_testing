name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per ref; superseded PR runs are cancelled, main runs never are
# (each main run must publish its report into the gh-pages history).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Gate 1 — "build" + code review: deps install, style/lint clean, every module
  # imports and every test collects. No build backend exists (test suite, not a
  # package), so install + collect-only IS the build check. Needs no secrets:
  # the placeholder satisfies settings.py's import-time API_BASE_URL requirement;
  # collection makes no HTTP calls.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check engine tests
      - run: ruff format --check engine tests
      - run: pytest --collect-only -q
        env:
          API_BASE_URL: https://build-check.invalid

  # Gate 2 — service liveness: /health + authenticated /echo must answer before
  # the slow E2E suite spends minutes against a dead or broken host.
  smoke:
    needs: lint
    runs-on: ubuntu-latest
    env:
      # Host is sensitive -> GitHub Actions secret.
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      # Tunable knobs -> GitHub Actions repository variables. Change them in the
      # GitHub UI (Settings -> Secrets and variables -> Actions -> Variables);
      # no PR needed. Unset falls back to the code defaults.
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
      SETTLEMENT_TIMEOUT: ${{ vars.SETTLEMENT_TIMEOUT }}
      SETTLEMENT_POLL_INTERVAL: ${{ vars.SETTLEMENT_POLL_INTERVAL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      # --allure-no-capture keeps captured logging/stdout out of the published
      # report — the report is world-readable and logs mention request lines.
      - run: pytest tests/smoke --alluredir=allure-results --allure-no-capture
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: allure-results

  # Gate 3 — the E2E suite.
  e2e:
    needs: smoke
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
      SETTLEMENT_TIMEOUT: ${{ vars.SETTLEMENT_TIMEOUT }}
      SETTLEMENT_POLL_INTERVAL: ${{ vars.SETTLEMENT_POLL_INTERVAL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/e2e --alluredir=allure-results --allure-no-capture
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results

  # Publish — builds the Allure report from whatever results exist (failures
  # included; a red run's report is the one you want to read). Deploys to
  # gh-pages only on main pushes; PR runs get the report as an artifact.
  report:
    needs: [smoke, e2e]
    if: always() && needs.smoke.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true
      # Prior reports feed Allure's trend/history widgets. The gh-pages branch
      # is bootstrapped once (empty orphan commit); a missing branch fails loudly
      # here rather than poisoning the publish dir with a half-initialized .git.
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 25
      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
      - name: Deploy report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
      # PR preview: this run's standalone report (allure-history/<run_number> is a
      # complete report) goes to pr-<PR>/ on the same Pages site; main's root and
      # trend history stay untouched. keep_files guards the rest of the branch.
      # Fork PRs are excluded — their GITHUB_TOKEN cannot push.
      - name: Deploy PR report preview to GitHub Pages
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/${{ github.run_number }}
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
      - name: Link the report in the run summary
        if: always()
        run: |
          PAGES="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            {
              echo "### Allure report"
              echo "This run: $PAGES/${{ github.run_number }}/"
              echo ""
              echo "Latest: $PAGES/"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "### Allure report"
              echo "PR preview: $PAGES/pr-${{ github.event.pull_request.number }}/"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Allure report: download the \`allure-report\` artifact from this run" >> "$GITHUB_STEP_SUMMARY"
          fi
