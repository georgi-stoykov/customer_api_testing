name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * 4-10 *"
    - cron: "0 8 * 1-3,11,12 *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  code_analysis:
    name: code analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check engine tests
      - run: ruff format --check engine tests
      - run: pytest --collect-only -q
        env:
          API_BASE_URL: https://build-check.invalid

  smoke:
    needs: code_analysis
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
      SETTLEMENT_TIMEOUT: ${{ vars.SETTLEMENT_TIMEOUT }}
      SETTLEMENT_POLL_INTERVAL: ${{ vars.SETTLEMENT_POLL_INTERVAL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/smoke --alluredir=allure-results --allure-no-capture
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-smoke
          path: allure-results

  integration:
    needs: smoke
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/integration --alluredir=allure-results --allure-no-capture
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-integration
          path: allure-results

  e2e:
    needs: smoke
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
      SETTLEMENT_TIMEOUT: ${{ vars.SETTLEMENT_TIMEOUT }}
      SETTLEMENT_POLL_INTERVAL: ${{ vars.SETTLEMENT_POLL_INTERVAL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/e2e --alluredir=allure-results --allure-no-capture
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results

  report:
    needs: [smoke, integration, e2e]
    if: always() && needs.smoke.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true
      - uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
      - uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 25
      - uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-history
      - name: Deploy report to GitHub Pages
        if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
      - name: Deploy PR report preview to GitHub Pages
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/${{ github.run_number }}
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
      - name: Link the report in the run summary
        if: always()
        run: |
          PAGES="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}"
          if { [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "schedule" ]; } && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            {
              echo "### Allure report"
              echo "This run: $PAGES/${{ github.run_number }}/"
              echo ""
              echo "Latest: $PAGES/"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "### Allure report"
              echo "PR preview: $PAGES/pr-${{ github.event.pull_request.number }}/"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Allure report: download the \`allure-report\` artifact from this run" >> "$GITHUB_STEP_SUMMARY"
          fi
