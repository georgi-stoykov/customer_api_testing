# Tooling config only — this repo is a test suite, not a distributable package.
# Dependencies (incl. dev tooling) live in requirements.txt
# (pip install -r requirements.txt).

[tool.pytest.ini_options]
# Put the repo root on sys.path so tests import `engine` without an install
# (no packaging, no `pip install -e .`).
pythonpath = ["."]
testpaths = ["tests"]
log_level = "INFO"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "TID", "ANN"]
# The formatter owns line length; long unsplittable strings are fine.
ignore = ["E501"]

[tool.ruff.lint.flake8-tidy-imports]
# Imports are absolute (from engine.x import y), never relative (from ..x import y).
ban-relative-imports = "all"

[tool.ruff.lint.isort]
# Keep the standard-library / third-party / first-party ordering, but no blank
# lines between the groups — one contiguous import block.
no-lines-before = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

[tool.ruff.format]
# Respect the magic trailing comma so exploded signatures stay one-per-line.
skip-magic-trailing-comma = false
